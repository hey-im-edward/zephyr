spring.datasource.url=${SPRING_TEST_DATASOURCE_URL:jdbc:mysql://localhost:3306/shoe_store_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_TEST_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${SPRING_TEST_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:root}}
spring.jpa.open-in-view=false

app.admin.username=${APP_ADMIN_USERNAME:admin@zephyr.vn}
app.admin.password=${APP_ADMIN_PASSWORD:TestAdminPassword123!}
app.jwt.secret=${APP_JWT_SECRET:test-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:30}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
app.payment.online.enabled=${APP_PAYMENT_ONLINE_ENABLED:true}
app.payment.online.session-expiry-minutes=${APP_PAYMENT_ONLINE_SESSION_EXPIRY_MINUTES:15}
app.payment.online.mock-checkout-base-url=${APP_PAYMENT_ONLINE_MOCK_CHECKOUT_BASE_URL:http://localhost:3000/checkout}
app.payment.online.wallet-deep-link-template=${APP_PAYMENT_ONLINE_WALLET_DEEPLINK_TEMPLATE:momo://app?action=pay&orderCode={orderCode}&amount={amount}&reference={reference}}
app.payment.online.viet-qr-bank-code=${APP_PAYMENT_ONLINE_VIETQR_BANK_CODE:VCB}
app.payment.online.viet-qr-account-number=${APP_PAYMENT_ONLINE_VIETQR_ACCOUNT_NUMBER:0123456789}
app.payment.online.viet-qr-account-name=${APP_PAYMENT_ONLINE_VIETQR_ACCOUNT_NAME:ZEphyr Test Shop}
app.chatbot.enabled=${APP_CHATBOT_ENABLED:false}
app.chatbot.provider=${APP_CHATBOT_PROVIDER:OPENAI_COMPATIBLE}
app.chatbot.base-url=${APP_CHATBOT_BASE_URL:https://api.openai.com/v1}
app.chatbot.api-key=${APP_CHATBOT_API_KEY:}
app.chatbot.model=${APP_CHATBOT_MODEL:gpt-4o-mini}
app.chatbot.temperature=${APP_CHATBOT_TEMPERATURE:0.2}
app.chatbot.max-tokens=${APP_CHATBOT_MAX_TOKENS:350}
app.chatbot.timeout-ms=${APP_CHATBOT_TIMEOUT_MS:15000}
app.chatbot.requests-per-minute=${APP_CHATBOT_REQUESTS_PER_MINUTE:20}
app.chatbot.system-prompt=${APP_CHATBOT_SYSTEM_PROMPT:Ban la tro ly ZEPHYR test.}
