spring.application.name=shoe-store-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shoe_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.admin.username=${APP_ADMIN_USERNAME:admin@zephyr.vn}
app.admin.password=${APP_ADMIN_PASSWORD:change-me-now}
app.jwt.secret=${APP_JWT_SECRET:change-this-super-long-dev-secret-key-for-zephyr}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:30}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
