spring.application.name=shoe-store-api
server.port=${SERVER_PORT:8080}
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shoe_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.admin.username=${APP_ADMIN_USERNAME:admin@zephyr.vn}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.auth.refresh-cookie.name=${APP_AUTH_REFRESH_COOKIE_NAME:zephyr_refresh_token}
app.auth.refresh-cookie.path=${APP_AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
app.auth.refresh-cookie.secure=${APP_AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.domain=${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:30}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
app.payment.online.enabled=${APP_PAYMENT_ONLINE_ENABLED:true}
app.payment.online.session-expiry-minutes=${APP_PAYMENT_ONLINE_SESSION_EXPIRY_MINUTES:15}
app.payment.online.requests-per-minute=${APP_PAYMENT_ONLINE_REQUESTS_PER_MINUTE:20}
app.payment.online.mock-checkout-base-url=${APP_PAYMENT_ONLINE_MOCK_CHECKOUT_BASE_URL:http://localhost:3000/checkout}
app.payment.online.wallet-deep-link-template=${APP_PAYMENT_ONLINE_WALLET_DEEPLINK_TEMPLATE:momo://app?action=pay&orderCode={orderCode}&amount={amount}&reference={reference}}
app.payment.online.viet-qr-bank-code=${APP_PAYMENT_ONLINE_VIETQR_BANK_CODE:}
app.payment.online.viet-qr-account-number=${APP_PAYMENT_ONLINE_VIETQR_ACCOUNT_NUMBER:}
app.payment.online.viet-qr-account-name=${APP_PAYMENT_ONLINE_VIETQR_ACCOUNT_NAME:}
app.payment.vnpay.tmn-code=${APP_PAYMENT_VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${APP_PAYMENT_VNPAY_HASH_SECRET:}
app.payment.vnpay.pay-url=${APP_PAYMENT_VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.querydr-url=${APP_PAYMENT_VNPAY_QUERYDR_URL:}
app.payment.vnpay.return-url=${APP_PAYMENT_VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return}
app.payment.vnpay.ipn-url=${APP_PAYMENT_VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}
app.payment.vnpay.query-ip-address=${APP_PAYMENT_VNPAY_QUERY_IP_ADDRESS:127.0.0.1}
app.payment.vnpay.query-timeout-ms=${APP_PAYMENT_VNPAY_QUERY_TIMEOUT_MS:5000}
app.payment.vnpay.version=${APP_PAYMENT_VNPAY_VERSION:2.1.0}
app.payment.vnpay.command=${APP_PAYMENT_VNPAY_COMMAND:pay}
app.payment.vnpay.currency-code=${APP_PAYMENT_VNPAY_CURRENCY_CODE:VND}
app.payment.vnpay.locale=${APP_PAYMENT_VNPAY_LOCALE:vn}
app.payment.vnpay.order-type=${APP_PAYMENT_VNPAY_ORDER_TYPE:other}
app.chatbot.enabled=${APP_CHATBOT_ENABLED:false}
app.chatbot.provider=${APP_CHATBOT_PROVIDER:OPENAI_COMPATIBLE}
app.chatbot.base-url=${APP_CHATBOT_BASE_URL:https://api.openai.com/v1}
app.chatbot.api-key=${APP_CHATBOT_API_KEY:}
app.chatbot.model=${APP_CHATBOT_MODEL:gpt-4o-mini}
app.chatbot.temperature=${APP_CHATBOT_TEMPERATURE:0.2}
app.chatbot.max-tokens=${APP_CHATBOT_MAX_TOKENS:350}
app.chatbot.timeout-ms=${APP_CHATBOT_TIMEOUT_MS:15000}
app.chatbot.requests-per-minute=${APP_CHATBOT_REQUESTS_PER_MINUTE:20}
app.chatbot.system-prompt=${APP_CHATBOT_SYSTEM_PROMPT:Ban la tro ly ZEPHYR, tra loi ngan gon, ro rang, uu tien thong tin checkout, don hang va san pham.}
