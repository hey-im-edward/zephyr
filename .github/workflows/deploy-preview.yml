name: Deploy Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-preview.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: preview
      url: ${{ vars.PREVIEW_URL }}
    env:
      PREVIEW_DEPLOY_URL: ${{ vars.PREVIEW_DEPLOY_URL }}
      PREVIEW_DEPLOY_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Deploy preview
        run: |
          if [ -z "$PREVIEW_DEPLOY_URL" ]; then
            echo "PREVIEW_DEPLOY_URL is not set; preview deploy is a placeholder."
            exit 0
          fi
          echo "Deploying preview to $PREVIEW_DEPLOY_URL"
          if [ -n "$PREVIEW_DEPLOY_TOKEN" ]; then
            echo "Preview deploy token is available."
          fi
