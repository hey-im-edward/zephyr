name: Deploy Staging

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    env:
      STAGING_DEPLOY_URL: ${{ vars.STAGING_DEPLOY_URL }}
      STAGING_DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Deploy staging
        run: |
          if [ -z "$STAGING_DEPLOY_URL" ]; then
            echo "STAGING_DEPLOY_URL is not set; staging deploy is a placeholder."
            exit 0
          fi
          echo "Deploying staging to $STAGING_DEPLOY_URL"
          if [ -n "$STAGING_DEPLOY_TOKEN" ]; then
            echo "Staging deploy token is available."
          fi
