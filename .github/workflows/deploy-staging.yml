name: Deploy Staging

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      mysql:
        image: mysql:8.1
        env:
          MYSQL_ROOT_PASSWORD: ci_mysql_${{ github.run_id }}_${{ github.run_attempt }}
          MYSQL_DATABASE: shoe_store
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pci_mysql_${{ github.run_id }}_${{ github.run_attempt }} --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    env:
      STAGING_DEPLOY_URL: ${{ vars.STAGING_DEPLOY_URL != '' && vars.STAGING_DEPLOY_URL || secrets.STAGING_DEPLOY_URL }}
      STAGING_DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
      STAGING_URL: ${{ vars.STAGING_URL }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL != '' && vars.STAGING_API_BASE_URL || secrets.STAGING_API_BASE_URL }}
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/shoe_store?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ci_mysql_${{ github.run_id }}_${{ github.run_attempt }}
      APP_ADMIN_USERNAME: admin@zephyr.vn
      APP_ADMIN_PASSWORD: ${{ secrets.STAGING_APP_ADMIN_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.STAGING_APP_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Non-main ref (${GITHUB_REF_NAME}): skip deploy input validation and deployment steps."
            exit 0
          fi
          if [ -z "${STAGING_DEPLOY_URL:-}" ]; then
            echo "STAGING_DEPLOY_URL is required (vars.STAGING_DEPLOY_URL or secrets.STAGING_DEPLOY_URL)."
            exit 1
          fi
          if [ -z "${STAGING_DEPLOY_TOKEN:-}" ]; then
            echo "STAGING_DEPLOY_TOKEN is required."
            exit 1
          fi
          if [ -z "${STAGING_URL:-}" ]; then
            echo "STAGING_URL is required for post-deploy health checks."
            exit 1
          fi
          if [ -z "${NEXT_PUBLIC_API_BASE_URL:-}" ]; then
            echo "STAGING_API_BASE_URL is required (vars.STAGING_API_BASE_URL or secrets.STAGING_API_BASE_URL)."
            exit 1
          fi

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          export APP_ADMIN_PASSWORD="${APP_ADMIN_PASSWORD:-ci-test-admin-password-only}"
          export APP_JWT_SECRET="${APP_JWT_SECRET:-ci-test-jwt-secret-for-build-only-0123456789abcdefghijklmnop}"
          ./mvnw -B verify

      - name: Trigger staging deploy
        if: ${{ github.ref_name == 'main' }}
        run: |
          curl --fail-with-body --show-error --silent \
            -X POST "$STAGING_DEPLOY_URL" \
            -H "Authorization: Bearer $STAGING_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"environment":"staging","source":"github-actions"}'

      - name: Verify staging health
        if: ${{ github.ref_name == 'main' }}
        run: |
          set -euo pipefail
          BASE_URL="${STAGING_URL%/}"
          for attempt in $(seq 1 20); do
            if curl -fsSL "$BASE_URL/" | grep -qi "<html" \
              && curl -fsSL "$BASE_URL/api/v1/home" | jq -e '.headline and (.featured | length > 0) and (.categories | length > 0)' >/dev/null; then
              echo "Staging health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed after deploy."
          exit 1

      - name: Rollback note
        if: ${{ failure() && github.ref_name == 'main' }}
        run: |
          echo "Deployment failed. Roll back to the last stable release in your platform and run smoke checks against $STAGING_URL."
