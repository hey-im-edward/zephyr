name: CI Frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/frontend-checks.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/frontend-checks.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    uses: ./.github/workflows/frontend-checks.yml
    with:
      working_directory: frontend
      node_version: "22"
