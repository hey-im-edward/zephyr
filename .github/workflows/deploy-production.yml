name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mysql:
        image: mysql:8.1
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shoe_store
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      PRODUCTION_DEPLOY_URL: ${{ vars.PRODUCTION_DEPLOY_URL }}
      PRODUCTION_DEPLOY_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/shoe_store?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_ADMIN_USERNAME: admin@zephyr.vn
      APP_ADMIN_PASSWORD: TestAdminPassword123!
      APP_JWT_SECRET: ci-production-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz
    steps:
      - uses: actions/checkout@v4

      - name: Validate production ref
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF:-}" != "refs/heads/main" ]; then
            echo "Production deploys may only run from refs/heads/main."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B verify

      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DEPLOY_URL:-}" ]; then
            echo "PRODUCTION_DEPLOY_URL is required."
            exit 1
          fi
          if [ -z "${PRODUCTION_DEPLOY_TOKEN:-}" ]; then
            echo "PRODUCTION_DEPLOY_TOKEN is required."
            exit 1
          fi
          if [ -z "${PRODUCTION_URL:-}" ]; then
            echo "PRODUCTION_URL is required for post-deploy health checks."
            exit 1
          fi

      - name: Trigger production deploy
        run: |
          curl --fail-with-body --show-error --silent \
            -X POST "$PRODUCTION_DEPLOY_URL" \
            -H "Authorization: Bearer $PRODUCTION_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"environment":"production","source":"github-actions"}'

      - name: Verify production health
        run: |
          set -euo pipefail
          BASE_URL="${PRODUCTION_URL%/}"
          for attempt in $(seq 1 20); do
            if curl -fsSL "$BASE_URL/" | grep -qi "<html" \
              && curl -fsSL "$BASE_URL/api/v1/home" | jq -e '.headline and (.featured | length > 0) and (.categories | length > 0)' >/dev/null; then
              echo "Production health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Production health check failed after deploy."
          exit 1

      - name: Rollback note
        if: ${{ failure() }}
        run: |
          echo "Deployment failed. Roll back to the last stable release in your platform and run smoke checks against $PRODUCTION_URL."
