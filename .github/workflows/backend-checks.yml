name: Backend Checks

on:
  workflow_call:
    inputs:
      working_directory:
        description: Backend workspace path
        required: false
        type: string
        default: backend
      java_version:
        description: Java version to use
        required: false
        type: string
        default: "21"
      mysql_image:
        description: MySQL image to use for tests
        required: false
        type: string
        default: mysql:8.1

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    services:
      mysql:
        image: ${{ inputs.mysql_image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shoe_store
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/shoe_store?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_ADMIN_USERNAME: admin@zephyr.vn
      APP_ADMIN_PASSWORD: TestAdminPassword123!
      APP_JWT_SECRET: ci-backend-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz
      SPRING_PROFILES_ACTIVE: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven

      - run: ./mvnw -B clean verify

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ${{ inputs.working_directory }}/target/*.jar
          if-no-files-found: error
